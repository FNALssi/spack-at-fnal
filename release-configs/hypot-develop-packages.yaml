# This is an example of the packages file that an experiment such as hypot
# would maintain to define their package requirements and constraints
# as the influence the building of LArSoft.

packages:

  # hypot packages
  hypot-ana:
    require:
    - "@=develop"
  hypot-ana-obj:
    require:
    - "@=develop"
  hypot-calib:
    require:
    - "@=develop"
  hypot-core:
    require:
    - "@=develop"
  hypot-daq-data-formats:
    require:
    - "@=develop"
  hypot-data-prep:
    require:
    - "@=develop"
  hypot-det-data-formats:
    require:
    - "@=develop"
  hypot-examples:
    require:
    - "@=develop"
  hypot-op-det:
    require:
    - "@=develop"
  hypot-pd-legacy:
    require:
    - "@=develop"
  hypot-prototypes:
    require:
    - "@=develop"
  hypot-reco:
    require:
    - "@=develop"
  hypot-sim:
    require:
    - "@=develop"
  hypot-sw:
    require:
    - "@=develop"
  hypot-util:
    require:
    - "@=develop"
  protohypot-ana:
    require:
    - "@=develop"

  # external dependencies
  # hypot requires this specific version. If any other experiment has a
  # conflicting requirement, the Spack global concretization will fail.
  # Then the LArSoft collaboration has to make a decision on how to
  # proceed.
  geant4:
    require:   # Note the single colon here. Do not use a double colon.
    - "@10.6.1"
   