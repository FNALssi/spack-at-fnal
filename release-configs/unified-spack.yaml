spack:
  config:
    deprecated: true
  include:
  # Toolchain defintion.
  # Defines the compiler (gcc or llvm/clang) and version.
  # Sets the %build_compiler toolchain variable name.
  - path: gcc-12-toolchain.yaml

  # Packages defintions.
  # These are version and variant requirements for a package suite
  - path: larsoft-packages.yaml
  - path: nusofthep-packages.yaml
  - path: art-packages.yaml
  - path: fife-packages.yaml

# These are included to gather the package dependencies for the HYPOT, FOO, BAR, and EXP packages. 
# They are not expected to be complete, but they are expected to be sufficient to concretize 
# the root specs defined in the corresponding *-specs.yaml files.
  # HYPOT packages
  - path: hypot-develop-packages.yaml
  # FOO packages
  - path: foo-develop-packages.yaml
  # BAR packages
  - path: bar-develop-packages.yaml
  # EXP packages
  - path: exp-develop-packages.yaml

  # Spec definitions.
  # These are definitions of the root specs for a package suite
  - path: art-specs.yaml
  - path: nusofthep-specs.yaml
  - path: larsoft-specs.yaml
  - path: fife-specs.yaml
  - path: hypot-specs.yaml
  - path: exp-specs.yaml
  - path: foo-specs.yaml
  - path: bar-specs.yaml

  specs:
    - $art_specs
    - $nusofthep_specs
    - $larsoft_specs
    - $fife_specs
    - $hypot_specs
    - $exp_specs
    - $foo_specs
    - $bar_specs

  concretizer:
    unify: true
    reuse:
      from:
      - type: local
      - type: external
  view: false
  packages:
    all:
      providers:
        libc:
        - glibc
        'zlib-api:':
        - zlib
      variants:
      - generator=ninja
      - build_type=Release
      - cxxstd=17
      target:
      - x86_64_v3
